<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Secure your study abroad education loan with Harbor Finance. Compare interest rates from 15+ top public sector banks, private banks, NBFCs, and international lenders. Get up to 98% approval rates and 100% free expert advisor support.">
  <meta name="keywords" content="study abroad loan, education loan, overseas education funding, student loan consultancy, non collateral education loan, unsecured student loan, harbor finance">
  <meta name="author" content="Harbor Finance">
  <meta name="robots" content="index, follow">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Harbor Finance | Study Abroad Education Loans & Financing">
  <meta property="og:description" content="Compare and secure study abroad student loans from 15+ top banks. Get fast 48-hour sanctions and collateral-free loan options. Free consulting.">
  <meta property="og:url" content="https://harborfinance.com">
  <meta property="og:image" content="https://harborfinance.com/assets/og-preview.jpg">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:title" content="Harbor Finance | Study Abroad Education Loans">
  <meta property="twitter:description" content="Compare student loans for studying abroad. Secure low interest rates and fast approvals.">
  <meta property="twitter:image" content="https://harborfinance.com/assets/og-preview.jpg">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Harbor Finance">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Harbor Finance | Study Abroad Education Loans & Financial Services</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #0F172A;
      margin: 0;
      padding: 0;
    }
    #loading-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      opacity: 1;
      transition: opacity 0.4s ease-out;
    }
    #loading-container.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .logo-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 120px;
      height: 120px;
      margin-bottom: 16px;
    }
    .spinner-ring {
      position: absolute;
      width: 80px;
      height: 80px;
      border: 3px solid rgba(37, 99, 235, 0.15);
      border-top: 3px solid #2563EB;
      border-radius: 50%;
      animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    }
    .anchor-logo {
      width: 56px;
      height: 56px;
      object-fit: contain;
      position: absolute;
      filter: brightness(0) invert(1) drop-shadow(0 0 4px rgba(37, 99, 235, 0.4));
      animation: pulse-glow 2s infinite ease-in-out;
    }
    .loading-text {
      color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .loading-subtext {
      color: #94A3B8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.2px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes pulse-glow {
      0%, 100% {
        transform: scale(1);
        filter: brightness(0) invert(1) drop-shadow(0 0 4px rgba(37, 99, 235, 0.4));
      }
      50% {
        transform: scale(1.1);
        filter: brightness(0) invert(1) drop-shadow(0 0 16px rgba(37, 99, 235, 0.8));
      }
    }
  </style>
</head>
<body>
  <div id="loading-container">
    <div class="logo-wrapper">
      <div class="spinner-ring"></div>
      <img class="anchor-logo" src="assets/assets/logoooo.png" alt="Harbor Finance" />
    </div>
    <div class="loading-text">Harbor Finance</div>
    <div class="loading-subtext">Securing your study abroad education loan...</div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
